<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clearweb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 272px; background: #0c0c0c; color: #f5f5f0; font-family: "Space Grotesk", system-ui, sans-serif; user-select: none; }
    .header { padding: 18px 18px 14px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 10px; }
    .logo { width: 28px; height: 28px; background: #e63946; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; }
    .brand { font-size: 15px; font-weight: 700; color: #f5f5f0; letter-spacing: -0.3px; }
    .tagline { font-size: 10px; color: #444; margin-top: 1px; }
    .main { padding: 16px 18px; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .toggle-label { font-size: 12px; color: #888; }
    .toggle { position: relative; width: 44px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #1e1e1e; border-radius: 24px; cursor: pointer; transition: 0.2s; border: 1px solid #2a2a2a; }
    .slider::before { content: ""; position: absolute; width: 18px; height: 18px; left: 2px; top: 2px; background: #444; border-radius: 50%; transition: transform 0.25s cubic-bezier(.4,0,.2,1), background 0.2s; }
    input:checked + .slider { border-color: #e63946; }
    input:checked + .slider::before { transform: translateX(20px); background: #e63946; }
    .stat-box { background: #111; border: 1px solid #1e1e1e; border-radius: 6px; padding: 12px 14px; display: flex; align-items: center; gap: 14px; margin-bottom: 16px; transition: opacity 0.3s; }
    .stat-number { font-size: 32px; font-weight: 700; color: #e63946; line-height: 1; min-width: 40px; }
    .stat-desc { font-size: 11px; color: #444; line-height: 1.5; }
    .stat-desc strong { display: block; font-size: 12px; color: #888; font-weight: 600; margin-bottom: 1px; }
    .tags-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #2e2e2e; margin-bottom: 8px; }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag { font-size: 10px; background: #111; border: 1px solid #1e1e1e; color: #444; padding: 3px 8px; border-radius: 3px; }
    .footer { padding: 11px 18px; border-top: 1px solid #141414; display: flex; align-items: center; justify-content: space-between; }
    .status { display: flex; align-items: center; gap: 6px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #e63946; transition: background 0.3s; }
    .dot.off { background: #2a2a2a; }
    .status-text { font-size: 10px; color: #444; }
    .site { font-size: 10px; color: #2e2e2e; }
    .main.disabled .stat-box { opacity: 0.2; }
    .main.disabled .tags { opacity: 0.2; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">✕</div>
    <div>
      <div class="brand">Clearweb</div>
      <div class="tagline">The web, without the AI</div>
    </div>
  </div>
  <div class="main" id="main">
    <div class="toggle-row">
      <span class="toggle-label">Block AI on this site</span>
      <label class="toggle">
        <input type="checkbox" id="toggle" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="count">0</div>
      <div class="stat-desc">
        <strong>Removed this page</strong>
        AI elements hidden
      </div>
    </div>
    <div class="tags-label">What's blocked</div>
    <div class="tags">
      <span class="tag">AI Overviews</span>
      <span class="tag">Copilot</span>
      <span class="tag">Gemini</span>
      <span class="tag">AI summaries</span>
      <span class="tag">Chat widgets</span>
      <span class="tag">AI answers</span>
      <span class="tag">Bots</span>
    </div>
  </div>
  <div class="footer">
    <div class="status">
      <div class="dot" id="dot"></div>
      <span class="status-text" id="status">Active</span>
    </div>
    <span class="site" id="site">—</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
